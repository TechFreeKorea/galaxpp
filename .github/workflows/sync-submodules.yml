name: Sync Submodules
on:
  repository_dispatch:
    types: [submodule-updated]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { token: "${{ secrets.SUBMODULE_SYNC_TOKEN }}", submodules: true, fetch-depth: 0 }
      - run: git submodule init && git submodule update --remote --merge || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then echo "No changes."; else git commit -m "chore: update submodule pointers" && git push; fi
      - if: success()
        uses: peter-evans/repository-dispatch@v3
        with: { token: "${{ secrets.SUBMODULE_SYNC_TOKEN }}", repository: "TechFreeKorea/Techfree_Solution", event-type: submodule-updated, client-payload: '{"submodule": "stellar-veil"}' }
